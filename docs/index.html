<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-title" content="F.O.R" />
    <meta name="description" content="Funker Optimizer REBORN is a remake of Funker Optimizer that features a new look while retaining the features of the original version">
    <meta name="keywords" content="fnf, friday night funkin, funker, optimizer, spritesheet, xml"/>
    <meta name="robots" content="notranslate">
    <title>Funker Optimizer REBORN (an web version)</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="assets/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="shortcut icon" href="assets/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
    <link rel="manifest" href="assets/site.webmanifest" />
</head>
<body>
    <div class="app-card" id="app">
        <div class="header">
            <span class="header-emoji" style="font-size:28px; flex-shrink:0;">❤️</span>
            <h1>Funker Optimizer <span class="reborn-text">REBORN</span></h1>
            <span class="header-emoji" style="font-size:28px;color:#FFFF8D; flex-shrink:0;">⭐</span>
        </div>
        <div class="divider"></div>

        <div class="section-card">
            <div class="section-title">
                <span style="font-size:18px;">📂</span>
                <span>File Selection</span>
            </div>
            <div class="file-buttons">
                <button class="btn" id="loadXmlBtn"><span style="font-size:18px;">📄</span> Load XML Files</button>
                <button class="btn" id="loadPngBtn"><span style="font-size:18px;">🖼️</span> Load Image Files</button>
            </div>
        </div>

        <div class="section-card" style="margin-bottom: 10px;">
            <div class="output-row">
                <span class="output-label"><span style="font-size:16px;">📁</span> Output folder: <span id="outputFolderLabel" style="color:#B0BEC5;">not set</span></span>
                <button class="btn btn-outline" id="selectOutputBtn" style="padding: 6px 18px;"><span style="font-size:16px;">📂</span> Select</button>
            </div>
        </div>

        <div class="list-grid">
            <div class="list-box" id="xmlListBox">
                <div class="list-header"><span style="font-size:14px;color:#4FC3F7;">📄</span><span style="color:#4FC3F7;font-weight:600;font-size:12px;">XML Files</span></div>
                <div id="xmlListContainer"><div class="list-empty">No XML files loaded</div></div>
            </div>
            <div class="list-box" id="pngListBox">
                <div class="list-header"><span style="font-size:14px;color:#4FC3F7;">🖼️</span><span style="color:#4FC3F7;font-weight:600;font-size:12px;">Image Files</span></div>
                <div id="pngListContainer"><div class="list-empty">No images loaded</div></div>
            </div>
        </div>

        <div class="aa-row">
            <span style="font-size:18px;color:#4FC3F7;">✨</span>
            <label>
                <input type="checkbox" id="aaCheckbox" checked /> Anti-aliasing
            </label>
        </div>

        <button class="process-btn" id="processBtn">
            <span style="font-size:22px;">▶️</span> Modify and Resize
        </button>

        <div class="status-bar">
            <span style="font-size:14px;color:#4FC3F7;">●</span>
            <span class="status-text" id="statusText">Ready</span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
